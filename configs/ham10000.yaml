seed: 42

data:
  splits_csv: data/processed/splits.csv
  image_size: 224
  num_workers: 0
  classes:
    - akiec
    - bcc
    - bkl
    - df
    - mel
    - nv
    - vasc

training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  dropout: 0.2
  optimizer: adamw
  weighted_loss: true
  patience: 5
  device: auto

models:
  - mobilenetv3_small_100
  - resnet50
  - efficientnet_b0
  - densenet121

output:
  run_dir: runs
