# v2 — Experiment 1: focal loss only (alpha from inverse class frequency)
# Differs from ham10000.yaml in:
#   training.loss: focal       (new)
#   training.focal_gamma: 2.0  (new)
#   training.weighted_loss: true  (kept — provides focal alpha)
#   output.run_dir: runs_v2
#   output.figures_dir: docs/figures/c_phase  (new; calibrate.py reads this)

seed: 42
data:
  splits_csv: data/processed/splits.csv
  image_size: 224
  num_workers: 0
  classes:
    - akiec
    - bcc
    - bkl
    - df
    - mel
    - nv
    - vasc
training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  dropout: 0.2
  optimizer: adamw
  weighted_loss: true
  loss: focal
  focal_gamma: 2.0
  patience: 5
  device: auto
models:
  - mobilenetv3_small_100
  - resnet50
  - efficientnet_b0
  - densenet121
output:
  run_dir: runs_v2
  figures_dir: docs/figures/c_phase
ensemble:
  version: ensemble-v1
  weights:
    resnet50: 0.38
    densenet121: 0.37
    efficientnet_b0: 0.20
    mobilenetv3_small_100: 0.05
  checkpoints:
    resnet50: runs/resnet50/best.pt
    densenet121: runs/densenet121/best.pt
    efficientnet_b0: runs/efficientnet_b0/best.pt
    mobilenetv3_small_100: runs/mobilenetv3_small_100/best.pt